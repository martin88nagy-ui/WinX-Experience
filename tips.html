<h1>Windows Tippek</h1>

<ul>
  <li>Win + V → Clipboard history</li>
  <li>Win + Shift + S → Screenshot</li>
  <li>Win + D → Desktop</li>
  <li>Alt + Tab → gyors váltás</li>
  <li>Win + L → lock screen</li>
  <li>Win + X → power menu</li>
</ul>
